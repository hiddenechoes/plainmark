name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Cheap gate (~10s) that decides whether the expensive cross-platform build
  # needs to run. Denylist by design: `build` is true for ANY change EXCEPT a
  # docs-only one, so a forgotten or new code path still builds — the safe
  # failure mode is "run", never "silently skip". To exempt a new docs-like
  # path, add another `!` exclusion below.
  changes:
    name: Detect code changes
    runs-on: ubuntu-22.04
    outputs:
      build: ${{ steps.filter.outputs.build }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            build:
              - '**'
              - '!**/*.md'
              - '!docs/**'
              - '!LICENSE'
              - '!.claude/**'
              - '!.github/dependabot.yml'

  checks:
    name: Static checks (lint, types, format, clippy)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux deps (Tauri 2)
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev \
            libappindicator3-dev librsvg2-dev patchelf

      # pnpm/action-setup@v4 needs a version: it reads package.json "packageManager"
      # (e.g. "packageManager": "pnpm@9.x"). Ensure that field exists.
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm format:check
      - run: cargo fmt --manifest-path src-tauri/Cargo.toml --all -- --check
      - run: cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets -- -D warnings

  build-and-test:
    name: Build & test (${{ matrix.platform }})
    # Skipped on docs-only changes. A job skipped via `if:` is treated as passing
    # by branch protection (unlike a workflow-level `paths:` filter, which never
    # reports and would block a required check), so this stays merge-safe.
    needs: changes
    if: needs.changes.outputs.build == 'true'
    strategy:
      fail-fast: false
      matrix:
        platform: [ubuntu-22.04, macos-latest, windows-latest]
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux deps (Tauri 2)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev \
            libappindicator3-dev librsvg2-dev patchelf

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - run: pnpm install --frozen-lockfile

      # Tests run on EVERY OS on purpose: the §7.1 line-ending / encoding
      # guarantees are platform-sensitive, so the atomic-write round-trip tests
      # must pass on Windows and macOS too — not just Linux.
      - run: cargo test --manifest-path src-tauri/Cargo.toml
      - run: pnpm test

      - run: pnpm tauri build
